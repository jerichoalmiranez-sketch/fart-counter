<!DOCTYPE html>
<html>
<head>
  <title>Fart Counter 🌍💨</title>
</head>
<body style="text-align:center;font-family:Arial;margin-top:100px;">
  <h1>🌍 Fart Counter</h1>
  <h2 id="count">9000000000</h2>

  <button onclick="fart()" style="font-size:30px;padding:20px;">
    💨 FART
  </button>

  <script>
    let count = 9000000000;

    function fart() {
      count++;
      document.getElementById("count").innerText =
        count.toLocaleString();
    }
  </script>
</body>
</html>
