<!DOCTYPE html>
<html>
<head>
  <title>Fart Counter 🌍💨</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 48px;
    }

    #count {
      font-size: 42px;
      margin: 20px;
      color: #222;
    }

    button {
      font-size: 30px;
      padding: 20px 40px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #111;
      color: white;
    }

    button:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>
  <h1>🌍 Fart Counter</h1>

  <div id="count">Loading...</div>

  <button onclick="fart()">💨 FART</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, runTransaction, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // 🔥 YOUR FIREBASE CONFIG (already filled in)
    const firebaseConfig = {
      apiKey: "AIzaSyB_W2kYalnK_BIZc3hYj2E4yXBf68C-Ke0",
      authDomain: "fart-counter-f86e8.firebaseapp.com",
      databaseURL: "https://fart-counter-f86e8-default-rtdb.firebaseio.com",
      projectId: "fart-counter-f86e8",
      storageBucket: "fart-counter-f86e8.firebasestorage.app",
      messagingSenderId: "194705501601",
      appId: "1:194705501601:web:96e1ceacc0c44015c62fe0"
    };

    // Init Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const counterRef = ref(db, "fartCount");

    // 🌍 LIVE GLOBAL COUNTER
    onValue(counterRef, (snapshot) => {
      const value = snapshot.val();
      document.getElementById("count").innerText =
        Number(value).toLocaleString();
    });

    // 💨 INCREMENT GLOBAL COUNT
    window.fart = function () {
      runTransaction(counterRef, (current) => {
        return (current || 9000000000) + 1;
      });
    };
  </script>
</body>
</html>
